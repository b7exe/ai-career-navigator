<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A.I. Neural Net - Roadmap Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .neon-text { text-shadow: 0 0 5px #0ff, 0 0 15px #0ff; }
        .neon-border { box-shadow: 0 0 10px #0ff, inset 0 0 10px rgba(0, 255, 255, 0.2); }
        .scanline {
            width: 100%; height: 100px; z-index: 50; position: fixed; pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0, 255, 255, 0.1) 50%, rgba(0,0,0,0) 100%);
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-900 text-cyan-400 font-mono min-h-screen flex items-center justify-center overflow-x-hidden relative selection:bg-purple-500 selection:text-white p-4">
    <div class="scanline"></div>
    
    <div class="relative z-10 bg-black/90 p-8 rounded-xl border border-cyan-500 neon-border w-full max-w-2xl transition-all duration-300 hover:shadow-[0_0_30px_#0ff]">
        
        <div class="flex justify-between items-end mb-6 border-b border-cyan-800 pb-4">
            <div>
                <h1 class="text-3xl font-bold neon-text uppercase tracking-widest">Neural Net v2.0</h1>
                <p class="text-xs text-cyan-600 mt-1">SECURE CONNECTION ESTABLISHED</p>
            </div>
            <span class="text-[10px] bg-cyan-900 text-cyan-300 px-2 py-1 rounded border border-cyan-500 animate-pulse">STATUS: ONLINE</span>
        </div>

        <form action="/get-roadmap" method="POST" id="ai-form" class="space-y-6">
            <div>
                <label class="block text-sm mb-2 text-purple-400 font-bold uppercase tracking-widest">Enter Target Vector:</label>
                <input type="text" name="career_goal" required placeholder="e.g. AI Red Teamer..." 
                       class="w-full p-4 bg-gray-900 border border-purple-500/50 rounded-lg focus:outline-none focus:border-purple-400 focus:shadow-[0_0_15px_rgba(168,85,247,0.4)] text-white placeholder-gray-600 transition-all">
            </div>
            
            <button type="submit" id="submit-btn" 
                    class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-lg uppercase tracking-widest transition-all duration-300 transform hover:scale-[1.02] hover:shadow-[0_0_20px_#0ff] flex justify-center items-center gap-3">
                <span id="btn-text">INITIALIZE GENERATION</span>
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        {% if roadmap %}
        <div class="mt-8 p-6 bg-gray-900 border-l-4 border-green-500 rounded-r-lg shadow-[0_0_15px_rgba(34,197,94,0.2)] animate-fade-in relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500 to-transparent"></div>
            <div class="flex items-center gap-3 mb-4">
                <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse shadow-[0_0_10px_#22c55e]"></div>
                <h2 class="text-xl font-bold text-green-400 uppercase tracking-wider">DECRYPTED DATA: {{ goal }}</h2>
            </div>
            <p class="text-gray-300 leading-relaxed font-sans text-sm whitespace-pre-wrap">{{ roadmap }}</p>
        </div>
        {% endif %}
        
    </div>

    <script>
        document.getElementById('ai-form').addEventListener('submit', function() {
            const btn = document.getElementById('submit-btn');
            const text = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            
            // Change button color to a warning yellow/orange
            btn.classList.remove('from-cyan-600', 'to-blue-600', 'hover:from-cyan-500', 'hover:to-blue-500');
            btn.classList.add('bg-gradient-to-r', 'from-orange-600', 'to-red-600', 'hover:from-orange-500', 'hover:to-red-500');
            btn.style.boxShadow = '0 0 20px #ea580c';
            
            // Update text and show spinner
            text.innerText = 'BYPASSING MAINFRAME...';
            spinner.classList.remove('hidden');
        });
    </script>
</body>
</html>
